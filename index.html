<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:#15232b;display:flex;align-items:center;justify-content:center;
    font-family:"Courier New",monospace;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent;}
  #wrap{position:relative;width:min(100vw,440px);aspect-ratio:400/640;max-height:100vh;box-shadow:0 20px 60px rgba(0,0,0,.5);}

<body>
<div id="wrap"><canvas id="game"></canvas></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 640;
function resize(){
  const rect = document.getElementById('wrap').getBoundingClientRect();
  canvas.width = W*devicePixelRatio; canvas.height = H*devicePixelRatio;
  canvas.style.width = rect.width+'px'; canvas.style.height = rect.height+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
window.addEventListener('resize', resize);
function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }

const GRAVITY=0.34, FLAP=-7.2;
const PIPE_W=64, GAP=168, SPEED=2.4, SPACING=230;
const GROUND_H=96, BIRD_X=110, BIRD_R=15;
const baseY = H - GROUND_H;

// ---- 9 mondes ----
const THEMES = {
  debut:  { name:'Début',     sky:['#5ec5e0','#bdeefb'], ground:'#ded895', groundDark:'#c9bf6e', grass:'#7ec850', grassDark:'#5fae3a', deco:'clouds', landmark:'hills' },
  berlin: { name:'Berlin',    sky:['#ff9d5c','#ffd7a1'], ground:'#6c6c79', groundDark:'#54545f', grass:'#8b8b97', grassDark:'#6a6a76', deco:'clouds', landmark:'berlin' },
  sydney: { name:'Sydney',    sky:['#7fd0ff','#d4eeff'], ground:'#d9c9a0', groundDark:'#c2b088', grass:'#5fb0d6', grassDark:'#3f90b6', deco:'clouds', landmark:'sydney' },
  newyork:{ name:'New York',  sky:['#9fb6d6','#e6eef7'], ground:'#7a7a86', groundDark:'#5e5e68', grass:'#8a8a96', grassDark:'#6a6a76', deco:'clouds', landmark:'newyork' },
  paris:  { name:'Paris',     sky:['#f3bdca','#fde8d0'], ground:'#cbb89a', groundDark:'#b09f82', grass:'#a9b07a', grassDark:'#89905f', deco:'clouds', landmark:'paris' },
  tokyo:  { name:'Tokyo',     sky:['#3a2f6b','#a85a9a'], ground:'#4a4458', groundDark:'#363044', grass:'#6a5a8a', grassDark:'#4a3a6a', deco:'neon', landmark:'tokyo' },
  moscou: { name:'Moscou',    sky:['#cfd9e8','#eef3fa'], ground:'#dce2ea', groundDark:'#c4ccd8', grass:'#eef3fa', grassDark:'#ccd6e2', deco:'snow', landmark:'moscou' },
  islande:{ name:'Islande',   sky:['#0e2236','#16395a'], ground:'#3a4a5a', groundDark:'#2a3a48', grass:'#4a6a7a', grassDark:'#36505e', deco:'aurora', landmark:'islande' },
  fuji:   { name:'Mont Fuji', sky:['#ffc2dd','#ffe7c9'], ground:'#e8c9a0', groundDark:'#d4b088', grass:'#ef82ad', grassDark:'#cf6390', deco:'sakura', landmark:'fuji' },
};
const LEAGUES = [
  {name:'Ligue 1', theme:'debut',   min:0},
  {name:'Ligue 2', theme:'berlin',  min:3},
  {name:'Ligue 3', theme:'sydney',  min:6},
  {name:'Ligue 4', theme:'newyork', min:10},
  {name:'Ligue 5', theme:'paris',   min:15},
  {name:'Ligue 6', theme:'tokyo',   min:21},
  {name:'Ligue 7', theme:'moscou',  min:28},
  {name:'Ligue 8', theme:'islande', min:36},
  {name:'Ligue 9', theme:'fuji',    min:45},
];
function leagueFor(s){ let idx=0; for(let i=0;i<LEAGUES.length;i++){ if(s>=LEAGUES[i].min) idx=i; } return idx; }

// ---- Skins (oiseaux) ----
const SKINS = [
  {id:'classique', name:'Classique',  rarity:'Commun',     body:'#ffd23f', belly:'#ffe98a', wing:'#f4a93a', beak:'#ff7a33'},
  {id:'cerise',    name:'Cerise',      rarity:'Commun',     body:'#ff5d5d', belly:'#ffb0b0', wing:'#d83b3b', beak:'#ff9a33'},
  {id:'moineau',   name:'Moineau',     rarity:'Commun',     body:'#b8a88f', belly:'#e6dccb', wing:'#8c7a63', beak:'#ff9a33'},
  {id:'citron',    name:'Citron',      rarity:'Commun',     body:'#d8e84a', belly:'#eef5a8', wing:'#a8b82f', beak:'#ff9a33'},
  {id:'ciel',      name:'Ciel',        rarity:'Rare',       body:'#5aa9ff', belly:'#bcdcff', wing:'#3a78d6', beak:'#ff9a33'},
  {id:'menthe',    name:'Menthe',      rarity:'Rare',       body:'#54d99a', belly:'#bff0d6', wing:'#2fb87a', beak:'#ff9a33'},
  {id:'corail',    name:'Corail',      rarity:'Rare',       body:'#ff8a7a', belly:'#ffd0c8', wing:'#e0594a', beak:'#ffcb2e'},
  {id:'givre',     name:'Givre',       rarity:'Rare',       body:'#9fe4ff', belly:'#e3f7ff', wing:'#5cc1e6', beak:'#ff9a33'},
  {id:'fantome',   name:'Fantôme',     rarity:'Épique',     body:'#a07cff', belly:'#d6c6ff', wing:'#7a52d6', beak:'#ffcb2e'},
  {id:'neon',      name:'Néon',        rarity:'Épique',     body:'#21e6c1', belly:'#aef7ec', wing:'#ff3df0', beak:'#ffffff', sparkle:true},
  {id:'lave',      name:'Lave',        rarity:'Épique',     body:'#ff5a2e', belly:'#ffb38a', wing:'#c42a00', beak:'#ffcb2e', sparkle:true},
  {id:'or',        name:'Or',          rarity:'Légendaire', body:'#ffcb2e', belly:'#ffe98a', wing:'#e0a200', beak:'#ff7a33', sparkle:true},
  {id:'arc',       name:'Arc-en-ciel', rarity:'Légendaire', body:'#ff6ec7', belly:'#ffffff', wing:'#6ec1ff', beak:'#ffd23f', rainbow:true},
  {id:'phenix',    name:'Phénix',      rarity:'Légendaire', body:'#ff7a18', belly:'#ffd23f', wing:'#ff2e2e', beak:'#ffffff', sparkle:true},
];
const RAR = { 'Commun':'#9aa3b0', 'Rare':'#4aa3ff', 'Épique':'#b163ff', 'Légendaire':'#ffb020' };
let skinIdx = Number(lsGet('flappy_skin') || 0);
if(isNaN(skinIdx) || skinIdx<0 || skinIdx>=SKINS.length) skinIdx = 0;
function cycleSkin(dir){ let i=skinIdx; for(let n=0;n<SKINS.length;n++){ i=(i+dir+SKINS.length)%SKINS.length; if(owned && owned[SKINS[i].id]){ skinIdx=i; lsSet('flappy_skin', skinIdx); return; } } }

// ---- Tuyaux par monde (couleur + forme) ----
const PIPES = {
  debut:  { stops:['#73c043','#9fe05a','#b6ee72','#9fe05a','#5aa632'], stroke:'#3f7a24', style:'classic' },
  berlin: { stops:['#7e848c','#a6acb4','#c0c6cd','#a6acb4','#5e646c'], stroke:'#43474e', style:'block',   cap:'#5e646c' },
  sydney: { stops:['#1f9bb0','#37c0d6','#7fe6f2','#37c0d6','#157e90'], stroke:'#0e5e6e', style:'classic' },
  newyork:{ stops:['#5a6470','#828c98','#9aa4b0','#828c98','#444c56'], stroke:'#2e343c', style:'block',   cap:'#3a414a' },
  paris:  { stops:['#d9c9a0','#efe2c2','#fff6e0','#efe2c2','#c2a878'], stroke:'#a0875a', style:'stone' },
  tokyo:  { stops:['#ff2ea8','#ff6ec7','#ffb0e2','#ff6ec7','#c81f86'], stroke:'#5afaff', style:'neon',    cap:'#ffb0e2' },
  moscou: { stops:['#c2342f','#e0524a','#f48a80','#e0524a','#9a201c'], stroke:'#ffd23f', style:'classic' },
  islande:{ stops:['#7fc8e8','#a8e0f4','#e0f6ff','#a8e0f4','#5aa8cf'], stroke:'#3f88b0', style:'ice' },
  fuji:   { stops:['#7faa3a','#a8d65a','#c6ea84','#a8d65a','#5f8a2a'], stroke:'#4a6a1f', style:'bamboo' },
};

let state='menu';
let bird, pipes, score, frame, groundX, flashAlpha, shakeT, deadTimer;
let league, theme, bannerT;
let trail = [];
let best = Number(lsGet('flappy_best')||0);
let scores = [];
try{ scores = JSON.parse(lsGet('flappy_scores')||'[]') || []; }catch(e){ scores = []; }
function recordScore(sc, world){
  if(sc<=0) return;
  scores.push({ s:sc, w:world, d:Date.now() });
  scores.sort((a,b)=>b.s-a.s);
  scores = scores.slice(0,10);
  lsSet('flappy_scores', JSON.stringify(scores));
}

// ---- Trophées (style Clash Royale : montée/descente + arènes) ----
const ARENAS = [
  {name:'Début',     min:0,    theme:'debut'},
  {name:'Berlin',    min:100,  theme:'berlin'},
  {name:'Sydney',    min:250,  theme:'sydney'},
  {name:'New York',  min:450,  theme:'newyork'},
  {name:'Paris',     min:700,  theme:'paris'},
  {name:'Tokyo',     min:1000, theme:'tokyo'},
  {name:'Moscou',    min:1400, theme:'moscou'},
  {name:'Islande',   min:1900, theme:'islande'},
  {name:'Mont Fuji', min:2500, theme:'fuji'},
];
function arenaFor(tr){ let i=0; for(let k=0;k<ARENAS.length;k++) if(tr>=ARENAS[k].min) i=k; return i; }
let trophyCount = Number(lsGet('flappy_trophies')||0); if(isNaN(trophyCount)) trophyCount=0;
let bestTrophies = Number(lsGet('flappy_besttrophies')||0); if(isNaN(bestTrophies)) bestTrophies=0;

// ---- Profil / économie / badges ----
let pseudo = lsGet('flappy_pseudo') || 'Joueur';
let coins = Number(lsGet('flappy_coins')||0); if(isNaN(coins)) coins=0;
let gems  = Number(lsGet('flappy_gems')||0);  if(isNaN(gems)) gems=0;
let feathers = Number(lsGet('flappy_feathers')||0); if(isNaN(feathers)) feathers=0;
// possession des oiseaux (collection)
let owned = null;
try{ owned = JSON.parse(lsGet('flappy_owned')||'null'); }catch(e){ owned=null; }
if(!owned || typeof owned!=='object'){ owned={}; SKINS.forEach((s,i)=>{ if(i<8) owned[s.id]=true; }); lsSet('flappy_owned', JSON.stringify(owned)); }
function isOwned(i){ return !!owned[SKINS[i].id]; }
function saveOwned(){ lsSet('flappy_owned', JSON.stringify(owned)); }
if(!isOwned(skinIdx)){ skinIdx=0; lsSet('flappy_skin',0); }
const WORLD_BADGE = { debut:'🌅', berlin:'🏙️', sydney:'🌉', newyork:'🗽', paris:'🗼', tokyo:'🌃', moscou:'⛪', islande:'🌌', fuji:'🗻' };
function fmtNum(n){ if(n>=1000000) return (n/1000000).toFixed(1).replace('.0','')+'M'; if(n>=10000) return Math.floor(n/1000)+'k'; return String(n); }
function menuTheme(){ return ARENAS[arenaFor(trophyCount)].theme; }
// petits oiseaux qui volent autour du menu
const menuBirds = Array.from({length:4}, (_,i)=>({ x:Math.random()*W, y:120+Math.random()*300, sp:0.5+Math.random()*0.8, dir:Math.random()<0.5?1:-1, ph:Math.random()*6, sc:0.5+Math.random()*0.25, skin:[2,4,8,12][i] }));

let lastDelta = 0;
const toasts = [];
function trophyDelta(sc, arenaIdx){
  const par = 3 + arenaIdx*2;              // score "attendu" pour ton arène
  let d = Math.round((sc - par) * 3);
  return Math.max(-25, Math.min(45, d));
}
function applyTrophies(){
  const before = arenaFor(trophyCount);
  lastDelta = trophyDelta(score, before);
  trophyCount = Math.max(0, trophyCount + lastDelta);
  lsSet('flappy_trophies', trophyCount);
  if(trophyCount > bestTrophies){ bestTrophies = trophyCount; lsSet('flappy_besttrophies', bestTrophies); }
  const after = arenaFor(trophyCount);
  if(after > before) toasts.push({ text:'Nouvelle arène : '+ARENAS[after].name, icon:'🏆', t:0 });
}

function reset(){
  bird={y:H/2,v:0,rot:0,flapT:0}; pipes=[];
  score=0; frame=0; groundX=0; flashAlpha=0; shakeT=0; deadTimer=0;
  league=0; theme=LEAGUES[0].theme; bannerT=0; trail=[];
  let x=W+140; for(let i=0;i<3;i++){ pipes.push(makePipe(x)); x+=SPACING; }
}
// ---- Multijoueur : course 2 joueurs via le serveur (WebSocket) ----
let online = false;
let mp = null;
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function rnd(){ return (online && mp && mp.rng) ? mp.rng() : Math.random(); }
function wsUrl(){ return (location.protocol==='https:'?'wss://':'ws://') + location.host; }
function mpConnect(then){
  if(!location.host){ mp={status:'Ouvre le jeu via le lien du serveur (pas en local).'}; online=false; return; }
  online=true; mp={status:'Connexion au serveur…', remote:null, remoteSkin:SKINS[1], code:null, side:0, seed:0, result:false};
  try{ mp.ws = new WebSocket(wsUrl()); }catch(e){ mp.status='Connexion impossible'; return; }
  mp.ws.onopen = ()=>{ if(then) then(); };
  mp.ws.onmessage = (e)=>{ let m; try{ m=JSON.parse(e.data); }catch(_){ return; } onNet(m); };
  mp.ws.onclose = ()=>{ if(mp && !mp.result) mp.status='Déconnecté'; };
  mp.ws.onerror = ()=>{ if(mp) mp.status='Erreur réseau'; };
}
function mpCreate(){ mpConnect(()=>{ mp.role='host'; mp.status='Création du salon…'; mp.ws.send(JSON.stringify({k:'create'})); }); }
function mpJoin(code){ mpConnect(()=>{ mp.role='guest'; mp.status='Connexion au salon…'; mp.ws.send(JSON.stringify({k:'join', code:code})); }); }
function onNet(m){
  if(!mp) return;
  if(m.k==='created'){ mp.code=m.code; mp.status='Donne ce code à ton ami'; }
  else if(m.k==='start'){ mp.seed=m.seed; mp.side=m.side; startRace(); }
  else if(m.k==='state'){ if(m.skin) mp.remoteSkin=SKINS.find(s=>s.id===m.skin)||SKINS[1]; mp.remote={y:m.y,rot:m.rot,flapT:m.flapT,score:m.score,alive:m.alive}; }
  else if(m.k==='full'){ mp.status='Salon déjà plein'; }
  else if(m.k==='notfound'){ mp.status='Code introuvable'; }
  else if(m.k==='left'){ mp.status='Ami parti'; if(mp.remote) mp.remote.alive=false; }
}
function startRace(){ mp.rng=mulberry32(mp.seed||1); mp.remote=mp.remote||{y:H/2,rot:0,flapT:0,score:0,alive:true}; mp.result=false; state='play'; reset(); flap(); }
function sendState(){
  if(online && mp && mp.ws && mp.ws.readyState===1){
    try{ mp.ws.send(JSON.stringify({k:'state', y:bird.y, rot:bird.rot, flapT:bird.flapT, score:score, alive:(state==='play'), skin:SKINS[skinIdx].id})); }catch(e){}
  }
}
function leaveMp(){ try{ if(mp&&mp.ws){ if(mp.ws.readyState===1) mp.ws.send(JSON.stringify({k:'leave'})); mp.ws.close(); } }catch(e){} mp=null; online=false; }

function makePipe(x){ const m=70; const gapY=m+rnd()*(H-GROUND_H-GAP-m*2); return {x,gapY,scored:false}; }

function flap(){ bird.v=FLAP; bird.flapT=6; }
function action(){
  if(state==='menu'){ state='play'; reset(); flap(); }
  else if(state==='play'){ flap(); }
  else if(state==='dead'){ if(deadTimer>28) state='menu'; }
}
function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const src = (e.touches && e.touches[0]) ? e.touches[0] : e;
  const sx = rect.width / W;
  return { x:(src.clientX-rect.left)/sx, y:(src.clientY-rect.top)/sx };
}
function onPress(e){
  e.preventDefault();
  const p = getPos(e);
  if(state==='rank' || state==='trophies'){ state='menu'; return; }
  if(state==='reveal'){ state='nids'; reveal=null; return; }
  if(state==='nids'){
    if(p.x>266 && p.x<374 && p.y>134 && p.y<168){ if(!openFreeNid()) toasts.push({text:'Pas assez de plumes',icon:'🪶',t:0}); return; }
    for(let k=0;k<NIDS.length;k++){ const y=192+k*88; if(p.x>280 && p.x<374 && p.y>y+20 && p.y<y+56){ if(!openNid(NIDS[k])) toasts.push({text:'Pas assez de pièces',icon:'🪙',t:0}); return; } }
    if(p.x>120 && p.x<280 && p.y>592 && p.y<630){ state='menu'; return; }
    return;
  }
  if(state==='oiseaux'){
    if(p.y>=100 && p.x>=20){
      const c=Math.floor((p.x-20)/94), r=Math.floor((p.y-100)/112);
      if(c>=0 && c<4){ const x=20+c*94, y=100+r*112; if(p.x<=x+84 && p.y>=y && p.y<=y+98){ const i=r*4+c; if(i>=0 && i<SKINS.length){ if(isOwned(i)){ skinIdx=i; lsSet('flappy_skin',i); } else { toasts.push({text:'Ouvre un Nid '+SKINS[i].rarity,icon:'🔒',t:0}); } return; } } }
    }
    if(p.x>120 && p.x<280 && p.y>592 && p.y<630){ state='menu'; return; }
    return;
  }
  if(state==='profil'){
    if(p.y>176 && p.y<206){ const n=prompt('Ton pseudo :', pseudo); if(n && n.trim()){ pseudo=n.trim().slice(0,16); lsSet('flappy_pseudo',pseudo); } return; }
    if(p.x>90 && p.x<310 && p.y>458 && p.y<498){ state='trophies'; return; }
    if(p.x>120 && p.x<280 && p.y>592 && p.y<630){ state='menu'; return; }
    return;
  }
  if(state==='course'){
    if(!mp || (!mp.code && !mp.ws)){
      if(p.x>60 && p.x<340 && p.y>250 && p.y<304){ mpCreate(); return; }                 // CRÉER
      if(p.x>60 && p.x<340 && p.y>320 && p.y<374){ const c=prompt('Code de la partie ?'); if(c) mpJoin(c.trim().toUpperCase()); return; } // REJOINDRE
    }
    if(p.x>120 && p.x<280 && p.y>560 && p.y<600){ leaveMp(); state='menu'; return; }      // Retour / Annuler
    return;
  }
  if(online && state==='dead'){
    if(mp && mp.result && deadTimer>20){ leaveMp(); state='menu'; }
    return;
  }
  if(state==='menu'){
    // bouton VOLER (centre, surélevé)
    if(Math.hypot(p.x-200, p.y-556) < 52){ action(); return; }
    // navigation du bas
    if(p.y>576){
      if(p.x<78){ state='nids'; return; }
      if(p.x<160){ state='oiseaux'; return; }
      if(p.x>244 && p.x<312){ state='rank'; return; }
      if(p.x>320){ state='profil'; return; }
      return;
    }
    // bouton course
    if(p.x>110 && p.x<290 && p.y>446 && p.y<478){ state='course'; mp=null; online=false; return; }
    // bannière joueur -> arènes/trophées
    if(p.x>10 && p.x<260 && p.y>42 && p.y<94){ state='trophies'; return; }
    return;
  }
  action();
}
canvas.addEventListener('mousedown', onPress);
canvas.addEventListener('touchstart', onPress, {passive:false});
window.addEventListener('keydown', e=>{
  if(state==='reveal'){ state='nids'; reveal=null; return; }
  if(state==='rank' || state==='trophies'){ if(e.code==='Escape'||e.code==='Space'){ e.preventDefault(); state='menu'; } return; }
  if(state==='nids' || state==='profil'){ if(e.code==='Escape'){ state='menu'; } return; }
  if(state==='oiseaux'){ if(e.code==='ArrowLeft'){ cycleSkin(-1); } else if(e.code==='ArrowRight'){ cycleSkin(1); } else if(e.code==='Escape'){ state='menu'; } return; }
  if(state==='course'){ if(e.code==='Escape'){ leaveMp(); state='menu'; } return; }
  if(online){ if((e.code==='Space'||e.code==='ArrowUp') && state==='play'){ e.preventDefault(); flap(); } return; }
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); action(); }
});

const clouds = Array.from({length:5}, ()=>({ x:Math.random()*W, y:40+Math.random()*180, s:0.6+Math.random()*0.8, spd:0.15+Math.random()*0.25 }));

function update(){
  frame++;
  if(state==='menu'){ menuBirds.forEach(b=>{ b.x += b.sp*b.dir; if(b.dir>0 && b.x>W+34){ b.x=-34; b.y=120+Math.random()*300; } if(b.dir<0 && b.x<-34){ b.x=W+34; b.y=120+Math.random()*300; } }); }
  groundX=(groundX-SPEED)%24;
  clouds.forEach(c=>{ c.x-=c.spd; if(c.x<-70){ c.x=W+40; c.y=40+Math.random()*180; } });
  if(bannerT>0) bannerT--;
  toasts.forEach(t=>t.t++);
  while(toasts.length && toasts[0].t>170) toasts.shift();
  if(state==='play' || state==='dead'){
    for(const p of trail){ p.x -= SPEED; p.t++; }
    trail = trail.filter(p=>p.t < 16);
  }

  if(state==='play'){
    bird.v+=GRAVITY; bird.y+=bird.v;
    bird.rot=Math.max(-0.5,Math.min(1.4,bird.v*0.06));
    if(bird.flapT>0) bird.flapT--;
    trail.push({ x:BIRD_X-10, y:bird.y, t:0 });
    pipes.forEach(p=>p.x-=SPEED);
    if(pipes.length && pipes[0].x<-PIPE_W){ pipes.shift(); pipes.push(makePipe(pipes[pipes.length-1].x+SPACING)); }
    pipes.forEach(p=>{
      if(!p.scored && p.x+PIPE_W<BIRD_X){
        p.scored=true; score++;
        if(score>best){ best=score; lsSet('flappy_best',best); }
        const lg=leagueFor(score);

function drawBackground(key){
  if(key==='fuji'){ drawFuji(THEMES.fuji); return; }
  if(key==='paris'){ drawParis(THEMES.paris); return; }
  if(key==='tokyo'){ drawTokyo(THEMES.tokyo); return; }
  const T=THEMES[key]||THEMES.debut;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,T.sky[0]); sky.addColorStop(1,T.sky[1]);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // sky effects behind landmark
  if(T.deco==='aurora'){
    for(let b=0;b<3;b++){
      const yb=66+b*30;
      ctx.beginPath(); ctx.moveTo(0,yb);
      for(let x=0;x<=W;x+=20) ctx.lineTo(x, yb+Math.sin(x*0.02+frame*0.02+b)*14);
      for(let x=W;x>=0;x-=20) ctx.lineTo(x, yb+24+Math.sin(x*0.02+frame*0.02+b)*14);

  }
  if(T.deco==='neon'){
    for(let i=0;i<20;i++){ const x=(i*89)%W, y=(i*41)%(baseY-140); ctx.fillStyle='rgba(255,150,230,'+(0.25+0.5*Math.abs(Math.sin(frame*0.06+i))).toFixed(2)+')'; ctx.fillRect(x,y,2,2); }
  }

  drawLandmark(T.landmark);

  // foreground particles
  if(T.deco==='clouds') clouds.forEach(drawCloud);
  if(T.deco==='sakura'){
    for(let i=0;i<30;i++){
      const sway=Math.sin(frame*0.03+i)*10;

      const sz=2.6+(i%3), al=(0.55+0.32*((i%4)/3)).toFixed(2);
      ctx.save(); ctx.translate(x,y); ctx.rotate(frame*0.04+i);
      ctx.fillStyle=(i%2)?('rgba(255,170,205,'+al+')'):('rgba(255,202,224,'+al+')');
      ctx.beginPath(); ctx.ellipse(0,0,sz,sz*0.55,0,0,7); ctx.fill(); ctx.restore();
    }

    for(let i=0;i<46;i++){ const x=((i*53)+frame*0.5)%W, y=((i*97)+frame*1.4)%(baseY), r=1.4+(i%3)*0.7;
      ctx.fillStyle='rgba(255,255,255,'+(0.65+0.3*(i%2)).toFixed(2)+')'; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); }

function pipeGrad(x,w,stops){
  const g=ctx.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,stops[0]); g.addColorStop(.4,stops[1]); g.addColorStop(.5,stops[2]); g.addColorStop(.6,stops[3]); g.addColorStop(1,stops[4]);
  return g;
}
function drawColumn(x,y,h,PT,isTop){
  if(h<=0) return;
  const stops=PT.stops, capH=24;
  ctx.fillStyle=pipeGrad(x,PIPE_W,stops); ctx.fillRect(x,y,PIPE_W,h);

  if(PT.style==='bamboo'){
    ctx.strokeStyle=PT.stroke; ctx.lineWidth=2;
    for(let yy=y+18; yy<y+h-4; yy+=34){ ctx.beginPath(); ctx.moveTo(x+2,yy); ctx.lineTo(x+PIPE_W-2,yy); ctx.stroke(); }
  } else if(PT.style==='ice'){
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(x+12,y+8); ctx.lineTo(x+26,y+h-8); ctx.stroke();
  } else if(PT.style==='block'){
    ctx.fillStyle='rgba(0,0,0,0.16)';
    for(let yy=y+12; yy<y+h-6; yy+=22){ ctx.beginPath(); ctx.arc(x+8,yy,2,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(x+PIPE_W-8,yy,2,0,7); ctx.fill(); }
  }

  ctx.lineWidth=3; ctx.strokeStyle=PT.stroke; ctx.strokeRect(x+1.5,y+1.5,PIPE_W-3,h-3);

  const cy = isTop ? (y+h-capH) : y;
  if(PT.style==='block'){
    ctx.fillStyle=PT.cap||stops[4]; ctx.fillRect(x,cy,PIPE_W,capH);
    ctx.strokeStyle=PT.stroke; ctx.lineWidth=3; ctx.strokeRect(x+1.5,cy+1.5,PIPE_W-3,capH-3);
  } else if(PT.style==='neon'){
    ctx.strokeStyle=PT.stroke; ctx.lineWidth=2; ctx.strokeRect(x+4.5,y+4.5,PIPE_W-9,h-9);
    ctx.fillStyle=PT.cap||stops[2]; ctx.fillRect(x-3,cy,PIPE_W+6,8);
    ctx.strokeStyle=PT.stroke; ctx.lineWidth=2; ctx.strokeRect(x-3+1,cy+1,PIPE_W+6-2,6);
  } else {
    const over=6;
    ctx.fillStyle=pipeGrad(x-over,PIPE_W+over*2,stops); ctx.fillRect(x-over,cy,PIPE_W+over*2,capH);
    ctx.strokeStyle=PT.stroke; ctx.lineWidth=3; ctx.strokeRect(x-over+1.5,cy+1.5,PIPE_W+over*2-3,capH-3);
    if(PT.style==='stone'){ ctx.fillStyle='#e6b84a'; ctx.fillRect(x-over,cy,PIPE_W+over*2,4); }
  }
}
function drawPipe(p){

function drawHeadFeature(skin){
  ctx.lineCap='round'; ctx.lineJoin='round';

    case 'classique': // petite huppe
      ctx.strokeStyle=skin.wing; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(-2,-13); ctx.lineTo(-6,-23); ctx.moveTo(0,-13); ctx.lineTo(0,-26); ctx.moveTo(2,-13); ctx.lineTo(6,-22); ctx.stroke();
      break;
    case 'cerise': // cerises
      ctx.strokeStyle='#3a7a24'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,-14); ctx.quadraticCurveTo(-2,-26,-4,-24); ctx.moveTo(0,-14); ctx.quadraticCurveTo(3,-27,5,-25); ctx.stroke();
      ctx.fillStyle='#e23b3b'; ctx.strokeStyle='#3a2f1b'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.arc(-5,-22,4,0,7); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(6,-23,4,0,7); ctx.fill(); ctx.stroke();

    case 'moineau': // feuille
      ctx.fillStyle='#7a9a4a'; ctx.strokeStyle='#5a7a30'; ctx.lineWidth=1.2;
      ctx.save(); ctx.translate(0,-22); ctx.rotate(-0.4); ctx.beginPath(); ctx.ellipse(0,0,6,3,0,0,7); ctx.fill(); ctx.stroke(); ctx.restore();
      ctx.beginPath(); ctx.moveTo(0,-13); ctx.lineTo(-1,-20); ctx.stroke();
      break;
    case 'citron': // citron + feuille
      ctx.save(); ctx.translate(0,-22); ctx.rotate(-0.25);
      ctx.fillStyle='#f4e04a'; ctx.strokeStyle='#b8a82f'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.ellipse(0,0,8,5.2,0,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#cbbf2f'; ctx.beginPath(); ctx.arc(8,0,1.6,0,7); ctx.fill();
      ctx.restore();
      ctx.fillStyle='#5fae3a'; ctx.beginPath(); ctx.ellipse(-7,-26,4,2,0.6,0,7); ctx.fill();
      break;
    case 'ciel': // petit nuage
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(-4,-22,4,0,7); ctx.arc(1,-25,5,0,7); ctx.arc(6,-22,4,0,7); ctx.rect(-4,-22,10,5); ctx.fill();
      break;
    case 'menthe': // feuilles de menthe
      ctx.strokeStyle='#2fb87a'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,-13); ctx.lineTo(0,-21); ctx.stroke();
      ctx.fillStyle='#54d99a'; ctx.strokeStyle='#2fb87a'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.ellipse(-4,-24,4,2.4,0.7,0,7); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(4,-24,4,2.4,-0.7,0,7); ctx.fill(); ctx.stroke();
      break;
    case 'corail': // branche de corail
      ctx.strokeStyle='#ff7a8a'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(0,-13); ctx.lineTo(0,-22);
      ctx.moveTo(0,-19); ctx.lineTo(-5,-26); ctx.moveTo(0,-20); ctx.lineTo(5,-25); ctx.moveTo(0,-22); ctx.lineTo(0,-30); ctx.stroke();
      break;
    case 'givre': // flocon
      ctx.strokeStyle='#cdeeff'; ctx.lineWidth=1.6;
      for(let k=0;k<6;k++){ const a=k*Math.PI/3; ctx.beginPath(); ctx.moveTo(0,-23); ctx.lineTo(Math.cos(a)*7, -23+Math.sin(a)*7); ctx.stroke(); }
      break;
    case 'fantome': // wisp fantôme
      ctx.globalAlpha=0.75; ctx.fillStyle='#ece4ff';
      ctx.beginPath(); ctx.arc(0,-24,6,Math.PI,0); ctx.lineTo(6,-19); ctx.lineTo(3,-22); ctx.lineTo(0,-19); ctx.lineTo(-3,-22); ctx.lineTo(-6,-19); ctx.closePath(); ctx.fill();
      ctx.globalAlpha=1; ctx.fillStyle='#7a52d6';
      ctx.beginPath(); ctx.arc(-2,-25,1,0,7); ctx.arc(2,-25,1,0,7); ctx.fill();
      break;
    case 'neon': // éclair néon
      ctx.fillStyle='#5afaff'; ctx.strokeStyle='#ff3df0'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(1,-13); ctx.lineTo(-4,-22); ctx.lineTo(-1,-22); ctx.lineTo(-4,-31); ctx.lineTo(6,-20); ctx.lineTo(2,-20); ctx.lineTo(4,-13); ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'lave': // magma + braises
      ctx.fillStyle='#ff5a2e';
      ctx.beginPath(); ctx.moveTo(-7,-13); ctx.quadraticCurveTo(-9,-22,-3,-22); ctx.quadraticCurveTo(0,-29,3,-22); ctx.quadraticCurveTo(9,-22,7,-13); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ffd23f'; ctx.beginPath(); ctx.arc(-3,-20,1.5,0,7); ctx.arc(3,-21,1.5,0,7); ctx.fill();
      break;
    case 'or': // couronne
      ctx.fillStyle='#ffd23f'; ctx.strokeStyle='#c89a00'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(-8,-14); ctx.lineTo(-8,-22); ctx.lineTo(-4,-18); ctx.lineTo(0,-25); ctx.lineTo(4,-18); ctx.lineTo(8,-22); ctx.lineTo(8,-14); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#ff5d5d'; ctx.beginPath(); ctx.arc(0,-17,1.6,0,7); ctx.fill();
      break;
    case 'arc': // arc-en-ciel
      ['#ff5d5d','#ffb020','#5fae3a','#4aa3ff'].forEach((c,k)=>{ ctx.strokeStyle=c; ctx.lineWidth=2.3; ctx.beginPath(); ctx.arc(0,-14,7+k*2.6,Math.PI,2*Math.PI); ctx.stroke(); });
      break;
    case 'phenix': // flamme
      ctx.fillStyle='#ff3b1f';
      ctx.beginPath(); ctx.moveTo(0,-13); ctx.quadraticCurveTo(-7,-20,-3,-27); ctx.quadraticCurveTo(0,-22,1,-32); ctx.quadraticCurveTo(3,-23,5,-26); ctx.quadraticCurveTo(7,-19,0,-13); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ffd23f';
      ctx.beginPath(); ctx.moveTo(0,-15); ctx.quadraticCurveTo(-3,-20,-1,-25); ctx.quadraticCurveTo(0,-21,1,-28); ctx.quadraticCurveTo(2,-21,3,-24); ctx.quadraticCurveTo(3,-18,0,-15); ctx.closePath(); ctx.fill();
      break;
  }
}
function drawBird(x,y,rot,flapT,skin){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  const bodyCol = skin.rainbow ? 'hsl('+((frame*4)%360)+',90%,62%)' : skin.body;
  ctx.fillStyle=bodyCol; ctx.strokeStyle='#3a2f1b'; ctx.lineWidth=2.5;
  roundRect(-16,-13,30,26,9); ctx.fill(); ctx.stroke();
  ctx.fillStyle=skin.belly; roundRect(-12,-2,22,13,7); ctx.fill();
  ctx.fillStyle=skin.wing; ctx.beginPath();
  if(flapT>3) ctx.ellipse(-4,-2,11,7,-0.5,0,7); else ctx.ellipse(-4,3,11,7,0.4,0,7);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(8,-5,6,0,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(10,-5,2.6,0,7); ctx.fill();
  ctx.fillStyle=skin.beak; ctx.beginPath(); ctx.moveTo(13,-3); ctx.lineTo(26,0); ctx.lineTo(13,5); ctx.closePath(); ctx.fill(); ctx.stroke();
  drawHeadFeature(skin);
  if(skin.sparkle){
    ctx.fillStyle='rgba(255,255,255,'+(0.5+0.5*Math.sin(frame*0.2)).toFixed(2)+')';
    ctx.font='12px serif'; ctx.textAlign='center'; ctx.fillText('✦',-2,-14);
  }
  ctx.restore();
}
function trailStyleOf(skin){
  if(skin.id==='phenix'||skin.id==='lave') return 'fire';
  if(skin.id==='neon') return 'glow';
  if(skin.id==='givre') return 'frost';
  if(skin.id==='arc')   return 'rainbow';
  if(skin.id==='or')    return 'gold';
  if(skin.id==='fantome') return 'ghost';
  if(skin.id==='ciel')  return 'cloud';
  return 'dust';
}
function renderTrail(parts, skin){
  const style=trailStyleOf(skin);
  for(const p of parts){
    const k = 1 - p.t/16;
    if(k<=0) continue;
    let col, a=k*0.7, r=2+k*6;
    if(style==='fire'){ col = p.t<4?'#fff2a8':(p.t<9?'#ff8a1f':'#e0301f'); }
    else if(style==='glow'){ col = (Math.floor(p.t/2)%2)?'#5afaff':'#ff3df0'; a=k*0.8; }
    else if(style==='frost'){ col='#dff4ff'; }
    else if(style==='rainbow'){ col='hsl('+(((p.x*4)+frame*4)%360+360)%360+',90%,62%)'; }
    else if(style==='gold'){ col=(p.t%3===0)?'#fff3b0':'#ffcb2e'; }
    else if(style==='ghost'){ col='#e8e4ff'; a=k*0.4; }
    else if(style==='cloud'){ col='#ffffff'; a=k*0.5; }
    else { col=skin.body; }
    ctx.globalAlpha=Math.max(0,a); ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 7); ctx.fill();
  }
  ctx.globalAlpha=1;
}

}

      ctx.fillStyle='#3a2f1b'; roundRect(90,270,220,70,16); ctx.fill(); ctx.strokeStyle='#ffd23f'; ctx.lineWidth=4; ctx.stroke();

function renderRaceEnd(){
  const myScore=score, oppScore=(mp&&mp.remote)?mp.remote.score:0;
  const ended = mp && mp.remote && mp.remote.alive===false;
  if(!ended){
    if(deadTimer>6){
      ctx.fillStyle='#3a2f1b'; roundRect(W/2-150,150,300,82,16); ctx.fill();
      ctx.strokeStyle='#ffd23f'; ctx.lineWidth=3; ctx.stroke();
      txt('Fini ! Ton score : '+myScore, W/2, 184, 19, '#fff');
      txt('En attente de l’ami… ('+oppScore+')', W/2, 212, 14, '#ffd23f');
    }
    return;
  }
  const a=Math.min(1,(deadTimer-6)/12); ctx.globalAlpha=Math.max(0,a);
  const win=myScore>oppScore, tie=myScore===oppScore;
  const pw=280, ph=200, px=(W-pw)/2, py=H/2-150;
  ctx.fillStyle='#fff7e0'; roundRect(px,py,pw,ph,16); ctx.fill();
  ctx.strokeStyle='#3a2f1b'; ctx.lineWidth=4; ctx.stroke();
  txt(tie?'ÉGALITÉ':(win?'TU GAGNES !':'TU PERDS'), W/2, py+54, 30, tie?'#c79a2e':(win?'#2e9e4f':'#d23b3b'), '#3a2f1b');
  txt('Toi', W/2-64, py+96, 16, '#3a2f1b'); txt('Ami', W/2+64, py+96, 16, '#3a2f1b');
  txt(myScore, W/2-64, py+132, 34, '#3a2f1b'); txt(oppScore, W/2+64, py+132, 34, '#3a2f1b');
  if(deadTimer>24){ const pulse=0.6+0.4*Math.sin(frame*0.1); ctx.globalAlpha=a*pulse; txt('Touchez pour le menu', W/2, py+ph+30, 17, '#fff', '#3a2f1b'); }
  ctx.globalAlpha=1;
}

// ---- Nids / œufs ----
const NIDS = [
  {id:'commun', name:'Œuf Commun',     color:'#9aa3b0', shell:'#e6e9ee', price:200,  pool:['Commun','Rare']},
  {id:'dore',   name:'Œuf Doré',       color:'#ffb020', shell:'#ffe6a8', price:800,  pool:['Rare','Épique']},
  {id:'legend', name:'Œuf Légendaire', color:'#b163ff', shell:'#e7d2ff', price:2000, pool:['Épique','Légendaire']},
];
const FREE_NID_COST = 60;
let reveal = null;
function birdsByRarity(rars){ const a=[]; SKINS.forEach((s,i)=>{ if(rars.indexOf(s.rarity)>=0) a.push(i); }); return a; }
function grantBird(i, color){
  const isNew=!isOwned(i); let dup=0;
  if(isNew){ owned[SKINS[i].id]=true; saveOwned(); }
  else { dup=18; feathers+=dup; lsSet('flappy_feathers',feathers); }
  reveal={i, isNew, dup, color:color||'#ffd23f'}; state='reveal';
}
function openNid(nid){
  if(coins<nid.price) return false;
  coins-=nid.price; lsSet('flappy_coins',coins);
  const pool=birdsByRarity(nid.pool);
  grantBird(pool[Math.floor(Math.random()*pool.length)], nid.color);
  return true;
}
function openFreeNid(){
  if(feathers<FREE_NID_COST) return false;
  feathers-=FREE_NID_COST; lsSet('flappy_feathers',feathers);
  const pool=birdsByRarity(['Commun','Rare','Épique','Légendaire']);
  const wts=pool.map(i=>({i, w: SKINS[i].rarity==='Commun'?8:SKINS[i].rarity==='Rare'?4:SKINS[i].rarity==='Épique'?2:1}));
  let tot=wts.reduce((a,b)=>a+b.w,0), r=Math.random()*tot, pick=wts[0].i;
  for(const w of wts){ r-=w.w; if(r<=0){ pick=w.i; break; } }
  grantBird(pick, '#43c463');
  return true;
}
function drawEgg(cx,cy,rx,ry,shell,spot){
  ctx.fillStyle=shell; ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,7); ctx.fill();
  ctx.fillStyle=spot; for(const o of [[-0.3,-0.2,0.22],[0.25,0.1,0.28],[-0.1,0.4,0.18],[0.35,-0.35,0.16]]){
    ctx.beginPath(); ctx.ellipse(cx+o[0]*rx, cy+o[1]*ry, rx*o[2], rx*o[2]*0.8, 0,0,7); ctx.fill();
  }
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,7); ctx.stroke();
}

function backBtn(label){
  ctx.fillStyle='#3a2f1b'; roundRect(120,592,160,38,12); ctx.fill();

  txt(label||'RETOUR', W/2, 617, 16, '#ffd23f');
}
function renderOiseaux(){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0e3a63'); g.addColorStop(1,'#0a2540');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  txt('COLLECTION D’OISEAUX', W/2, 52, 22, '#ffd23f', '#06223f');
  let cnt=0; for(let i=0;i<SKINS.length;i++) if(isOwned(i)) cnt++;
  txt(cnt+' / '+SKINS.length+' débloqués', W/2, 78, 13, '#9fb0c2');
  for(let i=0;i<SKINS.length;i++){
    const c=i%4, r=Math.floor(i/4), x=20+c*94, y=100+r*112, w=84, h=98;
    const own=isOwned(i), sel=(i===skinIdx);
    ctx.fillStyle = own?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.28)';
    roundRect(x,y,w,h,12); ctx.fill();
    ctx.lineWidth=sel?4:3; ctx.strokeStyle = sel?'#43c463':RAR[SKINS[i].rarity];
    roundRect(x,y,w,h,12); ctx.stroke();
    ctx.save(); ctx.translate(x+w/2, y+42); ctx.scale(0.82,0.82); ctx.globalAlpha=own?1:0.22;
    drawBird(0,0,0,(frame%44<8?6:0), SKINS[i]); ctx.restore(); ctx.globalAlpha=1;
    if(!own){ ctx.font='22px serif'; ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.fillText('🔒', x+w/2, y+50); }
    txt(SKINS[i].name, x+w/2, y+h-20, 10, own?'#fff':'#7f8a98');
    txt(SKINS[i].rarity, x+w/2, y+h-8, 8, RAR[SKINS[i].rarity]);
    if(sel){ ctx.fillStyle='#43c463'; ctx.beginPath(); ctx.arc(x+w-13,y+13,9,0,7); ctx.fill(); txt('✓', x+w-13, y+17, 11, '#06223f'); }
  }
  backBtn();
}

function renderNids(){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0e3a63'); g.addColorStop(1,'#0a2540');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  txt('NIDS', W/2, 50, 28, '#ffd23f', '#06223f');
  txt('Ouvre des œufs pour agrandir ta collection', W/2, 74, 12, '#9fb0c2');

  txt('🪙 '+fmtNum(coins)+'      🪶 '+fmtNum(feathers), W/2, 100, 15, '#fff', '#06223f');

  ctx.strokeStyle='#43c463'; ctx.lineWidth=2; ctx.stroke();
  txt('Nid gratuit (plumes)', 36, 138, 14, '#fff', null, 'left');
  const frac=Math.max(0,Math.min(1,feathers/FREE_NID_COST));
  ctx.fillStyle='rgba(255,255,255,0.15)'; roundRect(36,148,210,16,8); ctx.fill();
  ctx.fillStyle='#43c463'; roundRect(36,148,Math.max(6,210*frac),16,8); ctx.fill();
  txt(Math.min(feathers,FREE_NID_COST)+'/'+FREE_NID_COST+' 🪶', 141, 161, 11, '#fff');
  const freeOk=feathers>=FREE_NID_COST;
  ctx.fillStyle=freeOk?'#43c463':'#3a4654'; roundRect(266,134,108,34,10); ctx.fill();
  ctx.strokeStyle=freeOk?'#1f7a3a':'#2a3340'; ctx.lineWidth=2; ctx.stroke();
  txt('OUVRIR', 320, 156, 14, '#fff');

  // 3 œufs payants
  NIDS.forEach((n,k)=>{
    const y=192+k*88;
    ctx.fillStyle='rgba(255,255,255,0.06)'; roundRect(20,y,W-40,76,12); ctx.fill();
    ctx.strokeStyle=n.color; ctx.lineWidth=3; ctx.stroke();
    drawEgg(64,y+38,24,30,n.shell,n.color);
    txt(n.name, 100, y+30, 15, '#fff', null, 'left');
    txt(n.pool.join(' / '), 100, y+50, 11, n.color, null, 'left');
    const ok=coins>=n.price;
    ctx.fillStyle=ok?'#ffcf3f':'#3a4654'; roundRect(280,y+20,94,36,10); ctx.fill();

    txt('🪙 '+fmtNum(n.price), 327, y+42, 13, ok?'#3a2f1b':'#8a94a0');
  });
  backBtn();
}
function renderReveal(){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#06182e'); g.addColorStop(1,'#02060c');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const s=SKINS[reveal.i];
  // rayons
  ctx.save(); ctx.translate(W/2,290); ctx.globalAlpha=0.16;
  for(let a=0;a<12;a++){ ctx.rotate(Math.PI/6 + frame*0.005); ctx.fillStyle=reveal.color; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-26,-340); ctx.lineTo(26,-340); ctx.closePath(); ctx.fill(); }
  ctx.restore();
  txt(reveal.isNew?'NOUVEL OISEAU !':'DOUBLON', W/2, 150, 26, reveal.isNew?'#ffd23f':'#9fb0c2', '#06223f');
  const bob=Math.sin(frame*0.1)*6;
  ctx.save(); ctx.translate(W/2, 290+bob); ctx.scale(2.6,2.6); drawBird(0,0,0,(frame%30<8?6:0), s); ctx.restore();
  txt(s.name, W/2, 410, 30, RAR[s.rarity], '#06223f');
  txt(s.rarity, W/2, 440, 16, RAR[s.rarity], '#06223f');
  if(!reveal.isNew) txt('+'+reveal.dup+' 🪶 (déjà possédé)', W/2, 474, 15, '#3fd6a0', '#06223f');
  else txt('Ajouté à ta collection', W/2, 474, 14, '#9fb0c2');
  const pulse=0.6+0.4*Math.sin(frame*0.1); ctx.globalAlpha=pulse;
  txt('Touchez pour continuer', W/2, H-54, 16, '#fff', '#06223f'); ctx.globalAlpha=1;
}

function render(){
  if(state==='rank'){ renderRank(); return; }
  if(state==='trophies'){ renderTrophies(); return; }
  if(state==='course'){ renderCourse(); return; }
  if(state==='oiseaux'){ renderOiseaux(); return; }
  if(state==='profil'){ renderProfil(); return; }
  if(state==='nids'){ renderNids(); return; }
  if(state==='reveal'){ renderReveal(); return; }
  ctx.save();
  if(shakeT>0) ctx.translate((Math.random()-.5)*shakeT*0.6,(Math.random()-.5)*shakeT*0.6);
  if(state==='menu') drawMenuBackground(SKINS[skinIdx]); else drawBackground(theme);
  pipes.forEach(drawPipe);
  drawGround();
  if(online && mp && mp.remote && state!=='menu'){
    ctx.globalAlpha=0.5;
    drawBird(BIRD_X, mp.remote.y, mp.remote.rot||0, mp.remote.flapT||0, mp.remoteSkin||SKINS[1]);
    ctx.globalAlpha=1;
    txt('Ami', BIRD_X, mp.remote.y-26, 12, '#fff', '#173b63');
  }
  if(state!=='menu'){ renderTrail(trail, SKINS[skinIdx]); drawBird(BIRD_X, bird.y, bird.rot, bird.flapT, SKINS[skinIdx]); }

  if(state==='play'){
    txt(score, W/2, 92, 56, '#fff', '#3a2f1b');
    if(online) txt('Ami : '+((mp&&mp.remote)?mp.remote.score:0)+((mp&&mp.remote&&!mp.remote.alive)?'  💀':''), W/2, 122, 18, '#fff', '#173b63');
    else txt(LEAGUES[league].name+' · '+THEMES[theme].name, W/2, 120, 16, '#fff', '#3a2f1b');
  }

  if(bannerT>0){
    const a=bannerT>90?(110-bannerT)/20:(bannerT<20?bannerT/20:1);
    ctx.globalAlpha=Math.max(0,a);
    const by=200;
    ctx.fillStyle='#3a2f1b'; roundRect(W/2-150,by-34,300,68,16); ctx.fill();
    ctx.strokeStyle='#ffd23f'; ctx.lineWidth=3; ctx.stroke();
    txt(LEAGUES[league].name.toUpperCase(), W/2, by-4, 20, '#ffd23f');
    txt('Bienvenue à '+THEMES[theme].name, W/2, by+22, 16, '#fff');
    ctx.globalAlpha=1;
  }

  if(state==='menu'){
    const aIdx=arenaFor(trophyCount), th=ARENAS[aIdx].theme;
    // fond façon CR (bleu profond + losanges)
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0e3a63'); g.addColorStop(1,'#0a2540');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=2;
    for(let i=-H;i<W;i+=40){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i+H,H); ctx.stroke(); ctx.beginPath(); ctx.moveTo(i+H,0); ctx.lineTo(i,H); ctx.stroke(); }
    // oiseaux qui volent autour du menu
    menuBirds.forEach(b=>{ const yy=b.y+Math.sin(frame*0.05+b.ph)*8; ctx.save(); ctx.translate(b.x,yy); ctx.scale(b.dir*b.sc,b.sc); drawBird(0,0,0,(frame%24<8?6:0),SKINS[b.skin]); ctx.restore(); });

    // ---- panneau monde (centre, animé) ----
    const px=36, py=140, pw=328, ph=264;
    ctx.save(); roundRect(px,py,pw,ph,18); ctx.clip();
    ctx.translate(px+pw/2, py+ph); ctx.scale(1.22,1.22); ctx.translate(-(px+pw/2), -(py+ph));
    ctx.translate(0,(py+ph)-baseY); drawBackground(th); drawGround();
    ctx.restore();
    ctx.strokeStyle='#08243d'; ctx.lineWidth=7; roundRect(px,py,pw,ph,18); ctx.stroke();
    ctx.strokeStyle='#ffd23f'; ctx.lineWidth=2; roundRect(px+3,py+3,pw-6,ph-6,15); ctx.stroke();
    txt('LIGUE '+(aIdx+1)+' · '+ARENAS[aIdx].name.toUpperCase(), W/2, 428, 17, '#ffd23f', '#06223f');

    // ---- barre du haut : bannière joueur + pièces/gemmes ----
    ctx.fillStyle='rgba(6,20,38,0.9)'; roundRect(10,42,250,52,12); ctx.fill();
    ctx.strokeStyle='#1b4a78'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#11406a'; ctx.beginPath(); ctx.arc(40,68,22,0,7); ctx.fill();
    ctx.strokeStyle='#ffd23f'; ctx.lineWidth=2; ctx.stroke();
    ctx.font='22px serif'; ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.fillText(WORLD_BADGE[th]||'🌍', 40, 76);
    txt(pseudo, 72, 64, 16, '#fff', '#06223f', 'left');
    txt('🏆 '+trophyCount+'  ·  '+ARENAS[aIdx].name, 72, 85, 12, '#ffd23f', null, 'left');
    function pill(x,w,icon,val,col){
      ctx.fillStyle='rgba(6,20,38,0.9)'; roundRect(x,10,w,28,14); ctx.fill();
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
      ctx.font='15px serif'; ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.fillText(icon, x+8, 30);
      txt(val, x+w-10, 29, 13, '#fff', null, 'right');
    }
    pill(214,84,'🪙', fmtNum(coins), '#ffcf3f');
    pill(304,86,'💎', fmtNum(gems), '#3fd6a0');

    // bouton course (slim)
    ctx.fillStyle='#2f6db0'; roundRect(110,446,180,32,16); ctx.fill();
    ctx.strokeStyle='#173b63'; ctx.lineWidth=2; ctx.stroke();
    txt('🏁 COURSE 2 JOUEURS', W/2, 467, 13, '#fff', '#173b63');

    // ---- barre de navigation du bas ----
    ctx.fillStyle='rgba(5,16,30,0.96)'; ctx.fillRect(0,574,W,H-574);
    ctx.strokeStyle='#1b4a78'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,574); ctx.lineTo(W,574); ctx.stroke();
    function navItem(cx,icon,label){
      ctx.font='24px serif'; ctx.textAlign='center'; ctx.fillStyle='#cdd8e6'; ctx.fillText(icon,cx,610);
      txt(label,cx,630,10,'#9fb0c2');
    }
    navItem(44,'🎁','Nids'); navItem(122,'🐦','Oiseaux'); navItem(278,'🏆','Classt'); navItem(356,'👤','Profil');
    const pulse=1+0.04*Math.sin(frame*0.12);
    ctx.save(); ctx.translate(200,556); ctx.scale(pulse,pulse);
    ctx.beginPath(); ctx.arc(0,0,46,0,7); ctx.fillStyle='#43c463'; ctx.fill();
    ctx.lineWidth=5; ctx.strokeStyle='#1f7a3a'; ctx.stroke(); ctx.restore();
    ctx.font='26px serif'; ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.fillText('🪽',200,552);
    txt('VOLER', 200, 578, 14, '#fff', '#1f7a3a');
  }

  if(flashAlpha>0){ ctx.fillStyle=`rgba(255,255,255,${flashAlpha})`; ctx.fillRect(0,0,W,H); }

  if(state==='dead' && online){ renderRaceEnd(); }
  else if(state==='dead' && deadTimer>6){
    const a=Math.min(1,(deadTimer-6)/12); ctx.globalAlpha=a;
    const pw=260, ph=232, px=(W-pw)/2, py=H/2-145;
    ctx.fillStyle='#fff7e0'; roundRect(px,py,pw,ph,16); ctx.fill();
    ctx.strokeStyle='#3a2f1b'; ctx.lineWidth=4; ctx.stroke();
    txt('PERDU !', W/2, py+44, 32, '#e05a3a', '#3a2f1b');
    txt(THEMES[theme].name, W/2, py+72, 15, '#3a2f1b');
    txt('Score', W/2-58, py+104, 16, '#3a2f1b'); txt('Record', W/2+58, py+104, 16, '#3a2f1b');
    txt(score, W/2-58, py+134, 32, '#3a2f1b'); txt(best, W/2+58, py+134, 32, '#ffae00', '#3a2f1b');
    // trophies
    const dCol = lastDelta>=0 ? '#2e9e4f' : '#d23b3b';
    const dTxt = (lastDelta>=0?'+':'')+lastDelta;
    txt('🏆 '+trophyCount+'   '+dTxt, W/2, py+184, 22, dCol, '#3a2f1b');
    txt('Arène : '+ARENAS[arenaFor(trophyCount)].name, W/2, py+208, 13, '#3a2f1b');
    if(deadTimer>28){ const pulse=0.6+0.4*Math.sin(frame*0.1); ctx.globalAlpha=a*pulse; txt('Touchez pour rejouer', W/2, py+ph+28, 18, '#fff', '#3a2f1b'); }
    ctx.globalAlpha=1;
  }
  renderToasts();
  ctx.restore();
}

function loop(){ update(); render(); requestAnimationFrame(loop); }
resize(); reset(); state='menu'; loop();
</script>
